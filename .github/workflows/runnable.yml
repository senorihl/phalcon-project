name: Docker

on: [push]

jobs:
  build-test:
    name: "Build & run runnable container"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup docker
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          push: false
          tags: phalcon-project-tester:latest
          context: .
          file: ./docker/Dockerfile
          target: runnable
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Start test runner container
        run: docker compose -f production.compose.yaml up -d --wait
      - name: Tests some URLS
        run: |-
          _status=$(curl -s -o /dev/null -w "%{http_code}" http://phalcon-project.localhost/status)
          if [ $_status -ne 200 ]; then echo "Status<$_status> is not 200"; exit 1; fi
          _status=$(curl -s -o /dev/null -w "%{http_code}" http://phalcon-project.localhost/)
          if [ $_status -ne 200 ]; then echo "Status<$_status> is not 200"; exit 1; fi 
          _status=$(curl -s -o /dev/null -w "%{http_code}" http://phalcon-project.localhost/assets/manifest.json)
          if [ $_status -ne 200 ]; then echo "Status<$_status> is not 200"; exit 1; fi
      - name: Print logs of failure
        if: failure()
        run: docker compose -f production.compose.yaml logs web api
